# Alembic configuration for the TT-NN Visualizer app database (SQLite).
# The SQLAlchemy URL is always set programmatically at runtime; the value here
# is only a placeholder for CLI tools (e.g. ``alembic revision``).

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

sqlalchemy.url = sqlite:///placeholder.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
