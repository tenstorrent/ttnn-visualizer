name: Release — open dev → main PR

# When a release is published, open a PR to merge `dev` into `main`.
# PR title is the `version` field from `package.json` on `dev` (not the git tag).
#
# Optional: set repository secret COPILOT_GITHUB_TOKEN to a fine-grained PAT with the
# "Copilot Requests" permission (see GitHub Copilot CLI + Actions docs) so the PR body
# includes a Markdown summary generated by Copilot CLI from the dev vs main diff.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-dev-to-main-pr
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  open-merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from package.json
        id: pkg
        run: |
          set -euo pipefail
          version="$(jq -r .version package.json)"
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "::error::package.json version is missing or null; refusing to open PR."
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check for existing open PR (dev → main)
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          number="$(gh pr list --repo "${GITHUB_REPOSITORY}" --base main --head dev --state open --json number --jq '.[0].number // empty')"
          if [ -n "${number}" ]; then
            echo "has_open_pr=true" >> "${GITHUB_OUTPUT}"
            echo "number=${number}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_open_pr=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Report existing pull request
        if: steps.existing_pr.outputs.has_open_pr == 'true'
        run: |
          echo "An open PR from dev to main already exists (#${{ steps.existing_pr.outputs.number }}). Skipping."

      - name: Fetch main for Copilot comparison
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        run: git fetch origin main

      - name: Read .nvmrc
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}

      - name: Install Copilot CLI
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        run: npm install -g @github/copilot

      - name: Generate Copilot PR summary
        id: copilot
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          summary_path="${RUNNER_TEMP}/copilot-pr-summary.md"
          rm -f "${summary_path}"
          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "::notice::Skipping Copilot PR summary (repository secret COPILOT_GITHUB_TOKEN is not set). Add a fine-grained PAT with Copilot Requests permission to enable."
            exit 0
          fi
          copilot -p "$(printf '%s\n' \
            "You are summarizing an automated GitHub pull request that merges branch dev into main for repository ${GITHUB_REPOSITORY}." \
            "" \
            "Use git commands as needed to compare origin/main to HEAD (the dev branch tip). Produce a concise Markdown summary for reviewers:" \
            "- One short introductory paragraph on the overall theme of the merge." \
            "- Bullet points for notable changes (features, fixes, workflows/CI, dependencies, or areas needing careful review)." \
            "" \
            "Requirements:" \
            "- Write ONLY to this absolute file path: ${summary_path}" \
            "- Use Markdown (do not wrap the entire file in a fenced code block)." \
            "- If the diff is very large, emphasize themes and highest-impact areas instead of listing every file." \
            "- Do not restate the PR title; focus on substance.")" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          if [ ! -s "${summary_path}" ]; then
            echo "::warning::Copilot did not write a non-empty summary file."
          fi

      - name: Create pull request (if none open)
        if: steps.existing_pr.outputs.has_open_pr == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.pkg.outputs.version }}"
          event_name="${{ github.event_name }}"
          if [ "${event_name}" = "release" ]; then
            intro="Automated PR to merge \`dev\` into \`main\` after [${{ github.event.release.tag_name }}](${{ github.event.release.html_url }}) was published."
          else
            intro="Automated PR to merge \`dev\` into \`main\` (manual run via workflow_dispatch)."
          fi
          body_file="${RUNNER_TEMP}/pr-body.md"
          summary_path="${RUNNER_TEMP}/copilot-pr-summary.md"
          {
            printf '%s\n\n' "${intro}"
            printf '%s\n' "**package.json version on \`dev\`:** ${version}"
            if [ -s "${summary_path}" ]; then
              printf '\n---\n\n## Copilot generated summary\n\n'
              cat "${summary_path}"
            fi
          } > "${body_file}"
          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head dev \
            --title "${version}" \
            --body-file "${body_file}"
