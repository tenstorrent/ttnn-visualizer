name: Lint and Test

on:
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and Test (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      -   name: Read .nvmrc
          id: nvm
          run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      -   name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
              cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Get changed files in PR
        id: pr_changes
        run: |
            git fetch origin ${{ github.base_ref }} --depth=1
            # Get changed files, filter for .ts and .tsx, exclude deleted files, output as space-separated string
            CHANGED_FILES=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }} | grep -E '\.(ts|tsx)$' | tr '\n' ' ' | xargs)
            echo "changed=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Lint and test
        run: |
            if [ -n "${{ steps.pr_changes.outputs.changed }}" ]; then
                pnpm lint ${{ steps.pr_changes.outputs.changed }} --report-unused-disable-directives --max-warnings 0
            else
                echo "No .ts or .tsx files changed. Skipping lint."
            fi
            pnpm test

  backend-lint-and-test:
    name: Lint and Test (Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run Black
        run: uv run --frozen --extra dev black --check backend/ttnn_visualizer

      - name: Run Mypy
        run: PYTHONPATH=backend uv run --frozen --extra dev mypy backend/ttnn_visualizer

      - name: Run Backend Tests
        run: PYTHONPATH=backend uv run --frozen --extra dev pytest backend/ttnn_visualizer

  # Informational only: does not block merge. Backend CI installs with --frozen and
  # does not re-resolve; this job detects when uv.lock should be refreshed after
  # pyproject.toml changes (checked on Linux to match hosted CI).
  uv-lockfile-drift:
    name: UV lockfile drift (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check lockfile freshness
        id: lock_check
        run: uv lock --check

      - name: Comment when lockfile is stale
        if: steps.lock_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- uv-lockfile-drift -->';
            const body = [
              marker,
              '### `uv.lock` is out of date',
              '',
              'This check ran on **Linux** with the uv version from `[tool.uv]` in `pyproject.toml`.',
              '`pyproject.toml` and `uv.lock` disagree — refresh the lockfile and commit it:',
              '',
              '```shell',
              'uv lock --refresh',
              '```',
              '',
              'Backend CI installs with `uv sync --frozen` and will not update the lock for you.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Remove drift comment when lockfile is current
        if: steps.lock_check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- uv-lockfile-drift -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
