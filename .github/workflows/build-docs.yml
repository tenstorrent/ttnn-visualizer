name: Docs - Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'docs/**'

# Sets permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Install documentation dependencies
      run: uv sync --extra docs --locked

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    - name: Build Docs
      run: uv run --extra docs sphinx-build docs docs/output

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./docs/output

  # Deployment job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
