name: Release


on:
    push:
        branches:
            # Change to main when ready for automated versioning
            - main_

jobs:

    update-version:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              # TODO Replace email with official email
            - run: git config --global user.email "support@tenstorrent.com"
            - run: git config --global user.name "CI Job"

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  run_install: false

            - name: Read .nvmrc
              id: nvm
              run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ steps.nvm.outputs.NODE_VERSION }}

            - name: Read .python-version
              id: python
              run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_OUTPUT

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: ${{ steps.python.outputs.PYTHON_VERSION }}
                  enable-cache: true

            - name: Bump version for Node.js (package.json)
              run: |
                  pnpm version patch # Or `minor` / `major` depending on your needs
                  git add package.json
                  cat package.json
              env:
                  CI: true

            - name: Bump version for Python (pyproject.toml)
              run: |
                  uv run --no-project --with toml python3 scripts/bump_pyproject_version.py
                  git add pyproject.toml
                  cat pyproject.toml

            - name: Commit changes
              run: |
                  git commit -m "chore(release): bump versions"
                  git push origin main
