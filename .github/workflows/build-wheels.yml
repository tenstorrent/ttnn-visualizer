name: Build and Upload Python Wheel on Release
on:
  release:
    types: [released, prereleased ]

env:
    CIBW_BUILD_VERBOSITY: 1
    BASE_PATH: /
    NPM_CONFIG_PRODUCTION: false

jobs:
  build:
    name: Build Python Wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Read .nvmrc
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Read .python-version
        id: python
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ steps.python.outputs.PYTHON_VERSION }}
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  release:
    name: Upload Wheel to GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: /home/runner/work/ttnn-visualizer/
      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Get wheel file name
        id: get_wheel
        run: |
              # Find the .whl file and store its name in a variable
              FILE=$(find /home/runner/work/ttnn-visualizer/ -name "*.whl" -type f)
              WHEEL_FILE_NAME=$(basename $FILE)
              echo "Found wheel file: $FILE"
              # Set output to the found file name
              echo "wheel_name=$FILE" >> $GITHUB_ENV
              echo "wheel_file_name=$WHEEL_FILE_NAME" >> $GITHUB_ENV

      - name: Upload Wheel to Release
        uses: AButler/upload-release-assets@v3.0
        with:
            repo-token: ${{ secrets.GITHUB_TOKEN }}
            files: ${{ env.wheel_name }}
    permissions:
        contents: write
  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ttnn-visualizer
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-wheel
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
