name: Smoke Tests

on:
  pull_request:
    branches: [ "dev" ]
  push:
    branches: [ "dev" ]
  workflow_dispatch:

env:
  BASE_PATH: /
  NPM_CONFIG_PRODUCTION: false

jobs:
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Read .nvmrc
        id: nvm
        run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Read .python-version
        id: python
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ steps.python.outputs.PYTHON_VERSION }}
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  smoke-test:
    name: Smoke Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build-wheel
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Install wheel and dependencies
        run: |
          # Isolated venv so we test the wheel artifact, not the editable checkout.
          uv venv /tmp/smoke-venv
          uv pip install --python /tmp/smoke-venv dist/*.whl playwright
          /tmp/smoke-venv/bin/playwright install --with-deps chromium

      - name: Start ttnn-visualizer server in background
        run: |
          # Start the server in the background
          /tmp/smoke-venv/bin/ttnn-visualizer &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to start (max 30 seconds)
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8000 >/dev/null 2>&1; then
              echo "Server is running!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start within 30 seconds"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

      - name: Test server with curl
        run: |
          # Test that we can reach the server
          curl -f http://localhost:8000
          echo "✅ Server responded to curl request"

      - name: Run Playwright smoke test
        run: |
          /tmp/smoke-venv/bin/python scripts/smoke_test.py

      - name: Cleanup
        if: always()
        run: |
          # Kill the server process
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi
          # Also kill any ttnn-visualizer processes that might be running
          pkill -f "ttnn-visualizer" 2>/dev/null || true
          pkill -f "gunicorn.*ttnn_visualizer" 2>/dev/null || true
