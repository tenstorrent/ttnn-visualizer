name: Checking Dependency Licenses

on:
    pull_request:
        branches: [ "dev" ]
    workflow_dispatch:

jobs:
    check-licenses:
        name: Check Licenses
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   uses: pnpm/action-setup@v4
                name: Install pnpm
                with:
                    run_install: false

            -   name: Read .nvmrc
                id: nvm
                run: echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_OUTPUT

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ steps.nvm.outputs.NODE_VERSION }}
                    cache: 'pnpm'

            -   name: Install dependencies
                run: pnpm install

            -   name: Run license check
                id: license_check
                run: |
                    pnpm licenses ls --json | node scripts/check-missing-dep-licenses.mjs

